name: Validate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 0 * * *"  # Esegui daily per catturare breaking changes

jobs:
  validate-hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: "integration"
          ignore: "brands"

  validate-hass:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install homeassistant hassfest beautifulsoup4 aiohttp
      
      - name: Run hassfest validation
        run: |
          python -m script.hassfest --config custom_components/ail_tariffa_dinamica
      
      - name: Run pylint
        run: |
          pip install pylint
          pylint custom_components/ail_tariffa_dinamica --errors-only --ignore=tests
