name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * *"  # Test giornaliero

jobs:
  validate-hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: "integration"
          ignore: brands

  validate-hass:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install homeassistant pytest pytest-asyncio beautifulsoup4 aiohttp
          
      - name: Run hassfest validation
        uses: home-assistant/actions/hassfest@master
        
      - name: Run tests
        run: |
          pytest tests/ -v --cov=custom_components.ail_tariffa_dinamica --cov-report=xml
          
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        if: success()